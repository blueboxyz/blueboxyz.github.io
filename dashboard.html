<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bluebo — Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;600&family=IM+Fell+English:ital@0;1&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #000; }

    .dashboard {
      min-height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    .bg-vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(40,28,12,0.35) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 8px;
      color: #3a2e1e;
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .eyebrow::before, .eyebrow::after {
      content: '';
      width: 32px;
      height: 1px;
      background: #2a2218;
    }

    .hero-name {
      font-family: 'Cinzel', serif;
      font-size: 80px;
      font-weight: 300;
      color: #c8b89a;
      letter-spacing: 12px;
      line-height: 1;
      margin-bottom: 16px;
    }

    .hero-title {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 20px;
      color: #6b5a3e;
      margin-bottom: 6px;
    }

    .hero-exp {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 6px;
      color: #6b5a3e;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .divider {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, transparent, #3a2e1e, transparent);
      margin-bottom: 40px;
    }

    .hero-desc {
      font-family: 'IM Fell English', serif;
      font-size: 16px;
      color: #4a3f2f;
      line-height: 1.8;
      font-style: italic;
      max-width: 420px;
      margin-bottom: 56px;
    }

    nav {
      display: flex;
      gap: 48px;
      list-style: none;
    }

    nav a {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 5px;
      color: #6b5a3e;
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.4s;
      position: relative;
      padding-bottom: 6px;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 1px;
      background: #c8b89a;
      transition: width 0.4s;
    }

    nav a:hover { color: #c8b89a; }
    nav a:hover::after { width: 100%; }

    .brand {
      position: fixed;
      bottom: 28px;
      right: 48px;
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 6px;
      color: #1e1a12;
      text-transform: uppercase;
      z-index: 10;
    }

    #mist {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100vw;
      height: 300px;
      pointer-events: none;
      z-index: 5;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .eyebrow    { animation: fadeUp 1s ease both; animation-delay: 0.1s; opacity: 0; }
    .hero-name  { animation: fadeUp 1s ease both; animation-delay: 0.25s; opacity: 0; }
    .hero-title { animation: fadeUp 1s ease both; animation-delay: 0.4s; opacity: 0; }
    .hero-exp   { animation: fadeUp 1s ease both; animation-delay: 0.5s; opacity: 0; }
    .divider    { animation: fadeUp 1s ease both; animation-delay: 0.6s; opacity: 0; }
    .hero-desc  { animation: fadeUp 1s ease both; animation-delay: 0.7s; opacity: 0; }
    nav         { animation: fadeUp 1s ease both; animation-delay: 0.9s; opacity: 0; }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="bg-vignette"></div>

    <div class="content">
      <div class="eyebrow">Welcome</div>
      <div class="hero-name">Bluebo</div>
      <div class="hero-title">Roblox Developer</div>
      <div class="hero-exp">5+ Years of Experience</div>
      <div class="divider"></div>
      <div class="hero-desc">"Crafting worlds, systems, and tools within the realm of Roblox — built with precision, delivered with purpose."</div>
      <nav>
        <a href="portfolio.html">Portfolio</a>
        <a href="shop.html">Shop</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>

    <div class="brand">Bluebo</div>
  </div>

  <canvas id="mist"></canvas>

  <script>
    const canvas = document.getElementById('mist');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = 300; }
    resize();
    window.addEventListener('resize', resize);
    const particles = [];
    for (let i = 0; i < 200; i++) {
      particles.push({
        x: Math.random() * window.innerWidth,
        y: 280 + Math.random() * 20,
        r: 80 + Math.random() * 140,
        alpha: 0.03 + Math.random() * 0.08,
        speed: 0.08 + Math.random() * 0.2,
        drift: (Math.random() - 0.5) * 0.15
      });
    }
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const p of particles) {
        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
        grad.addColorStop(0, `rgba(210,200,180,${p.alpha})`);
        grad.addColorStop(0.5, `rgba(180,170,150,${p.alpha * 0.4})`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        p.x += p.speed + p.drift;
        if (p.x - p.r > canvas.width) {
          p.x = -p.r;
          p.y = 280 + Math.random() * 20;
        }
      }
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>

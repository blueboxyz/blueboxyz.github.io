<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bluebo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    .page {
      min-height: 100vh;
      background: #000;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
      overflow: hidden;
    }

    .bg-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(80,50,20,0.18) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .knight-side {
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
    }

    .knight-side img {
      height: 92vh;
      object-fit: contain;
      filter: brightness(0.75) contrast(1.05) sepia(0.2);
      mask-image: linear-gradient(to top, rgba(0,0,0,1) 60%, transparent 100%),
                  linear-gradient(to right, transparent 0%, rgba(0,0,0,1) 40%);
      -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 60%, transparent 100%),
                          linear-gradient(to right, transparent 0%, rgba(0,0,0,1) 40%);
      mask-composite: intersect;
      -webkit-mask-composite: source-in;
    }

    .fog {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 220px;
      background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 100%);
      pointer-events: none;
    }

    .right-side {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 70px 60px 30px;
      position: relative;
      z-index: 2;
    }

    .rune-line {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 8px;
      color: #3a2e1e;
      margin-bottom: 40px;
      text-transform: uppercase;
    }

    .quote {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 26px;
      color: #c8b89a;
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .quote-attr {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 5px;
      color: #4a3f2f;
      margin-bottom: 64px;
      text-transform: uppercase;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: #2a2218;
      margin-bottom: 36px;
    }

    .key-label {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 6px;
      color: #4a3f2f;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .key-input {
      width: 100%;
      max-width: 380px;
      background: transparent;
      border: none;
      border-bottom: 1px solid #2a2218;
      color: #c8b89a;
      font-family: 'IM Fell English', serif;
      font-size: 22px;
      letter-spacing: 8px;
      padding: 12px 0;
      outline: none;
      transition: border-color 0.4s;
    }
    .key-input::placeholder { color: #2a2218; }
    .key-input:focus { border-bottom-color: #6b5a3e; }

    .enter-btn {
      margin-top: 36px;
      background: transparent;
      border: 1px solid #2a2218;
      color: #4a3f2f;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 6px;
      text-transform: uppercase;
      padding: 16px 32px;
      cursor: pointer;
      transition: all 0.4s;
      max-width: 380px;
      width: 100%;
    }
    .enter-btn:hover {
      border-color: #6b5a3e;
      color: #c8b89a;
      background: rgba(100,80,40,0.07);
    }

    .brand {
      position: absolute;
      bottom: 32px;
      right: 70px;
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 8px;
      color: #1e1a12;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="bg-glow"></div>
    <div class="knight-side">
      <img src="https://files.catbox.moe/f04xa8.png" alt="Knight" />
      <div class="fog"></div>
    </div>
    <div class="right-side">
      <div class="rune-line">⸻ &nbsp; Bluebo &nbsp; ⸻</div>
      <div class="quote">"Thou shalt not pass these gates without thy key. Speak it now, or be swallowed by the eternal dark."</div>
      <div class="quote-attr">— The Gatekeeper</div>
      <div class="divider"></div>
      <div class="key-label">Thy Key</div>
      <input class="key-input" type="password" placeholder="· · · · · · · · · ·" />
      <button class="enter-btn">Present thy key</button>
    </div>
    <div class="brand">Bluebo</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bluebo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="knight-side">
      <img src="https://files.catbox.moe/f04xa8.png" alt="Knight" />
    </div>
    <div class="right-side">
      <div class="quote">"Thou shalt not pass these gates without thy key. Speak it now, or turn back into the darkness."</div>
      <div class="quote-attr">— The Gatekeeper</div>
      <div class="divider"></div>
      <div class="key-label">Thy Key</div>
      <input class="key-input" type="password" placeholder="· · · · · · · · · ·" />
      <button class="enter-btn">Present thy key</button>
    </div>
  </div>

  <canvas id="mist"></canvas>
  <div class="brand">Bluebo</div>

  <script>
    const canvas = document.getElementById('mist');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = 300;
    }
    resize();
    window.addEventListener('resize', resize);

    const particles = [];

    for (let i = 0; i < 90; i++) {
      particles.push({
        x: Math.random() * window.innerWidth,
        y: 220 + Math.random() * 80,
        r: 80 + Math.random() * 140,
        alpha: 0.015 + Math.random() * 0.04,
        speed: 0.08 + Math.random() * 0.2,
        drift: (Math.random() - 0.5) * 0.15
      });
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const p of particles) {
        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
        grad.addColorStop(0, `rgba(210,200,180,${p.alpha})`);
        grad.addColorStop(0.5, `rgba(180,170,150,${p.alpha * 0.4})`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();

        p.x += p.speed + p.drift;

        if (p.x - p.r > canvas.width) {
          p.x = -p.r;
          p.y = 220 + Math.random() * 80;
        }
      }

      // Only mask the very top edge of the mist canvas
      const fade = ctx.createLinearGradient(0, 0, 0, 120);
      fade.addColorStop(0, 'rgba(0,0,0,1)');
      fade.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = fade;
      ctx.fillRect(0, 0, canvas.width, 120);

      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>

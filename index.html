<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; margin: 0; padding: 0; }
  .page {
    min-height: 100vh;
    background: #000;
    display: flex;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .knight-wrap {
    flex: 0 0 auto;
    height: 100vh;
    display: flex;
    align-items: flex-end;
  }
  .knight-wrap img {
    height: 100%;
    object-fit: contain;
    filter: brightness(0.8) contrast(1.1);
    mask-image: linear-gradient(to right, transparent 0%, rgba(0,0,0,0.7) 30%, rgba(0,0,0,1) 60%);
    -webkit-mask-image: linear-gradient(to right, transparent 0%, rgba(0,0,0,0.7) 30%, rgba(0,0,0,1) 60%);
  }
  .right {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px 80px 40px 40px;
    z-index: 2;
  }
  .quote {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 32px;
    color: #bbb;
    line-height: 1.6;
    margin-bottom: 60px;
    border-left: 2px solid #333;
    padding-left: 28px;
  }
  .quote em {
    color: #666;
    font-size: 16px;
    display: block;
    margin-top: 14px;
    font-style: normal;
    font-family: 'Cinzel', serif;
    letter-spacing: 4px;
  }
  .key-label {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 6px;
    color: #555;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .key-input {
    width: 100%;
    max-width: 460px;
    background: transparent;
    border: none;
    border-bottom: 1px solid #333;
    color: #ccc;
    font-family: 'Cinzel', serif;
    font-size: 20px;
    letter-spacing: 6px;
    padding: 14px 0;
    outline: none;
    transition: border-color 0.3s;
  }
  .key-input::placeholder { color: #333; letter-spacing: 6px; }
  .key-input:focus { border-bottom-color: #777; }
  .enter-btn {
    margin-top: 32px;
    background: transparent;
    border: 1px solid #333;
    color: #777;
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 6px;
    text-transform: uppercase;
    padding: 18px 32px;
    cursor: pointer;
    transition: all 0.3s;
    max-width: 460px;
    width: 100%;
  }
  .enter-btn:hover { border-color: #888; color: #ddd; background: rgba(255,255,255,0.03); }
  .brand {
    position: absolute;
    bottom: 28px;
    right: 80px;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 8px;
    color: #2a2a2a;
  }
</style>

<div class="page">
  <div class="knight-wrap">
    <img src="https://files.catbox.moe/f04xa8.png" alt="Knight" />
  </div>
  <div class="right">
    <div class="quote">
      "Thou shalt not pass these gates without thy key. Speak it now, or turn back into the darkness."
      <em>— The Gatekeeper</em>
    </div>
    <div class="key-label">Thy Key</div>
    <input class="key-input" type="password" placeholder="· · · · · · · · · ·" />
    <button class="enter-btn">Present thy key</button>
  </div>
  <div class="brand">Bluebo</div>
</div>
